    <div id="Container_de_formulario">
      <div id="formulario">
        <h1 id="titulo_formulario">Cadastrar-se</h1>
        <form id="formulario_cadastro">
          <label for="tipo_de_usuario">Tipo de Usuário:</label>
          <select id="tipo_de_usuario" name="tipo_de_usuario" required>
            <option value="paciente">Paciente</option>
            <option value="profissional">Profissional de Saúde</option>
          </select>

          <label for="nome">Nome:</label>
          <input type="text" id="nome" name="nome" required />

          <label for="cpf">CPF:</label>
          <input type="number" id="cpf" name="cpf" required />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required />

          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" required />

          <label for="data_nascimento">Data de Nascimento:</label>
          <input
            type="date"
            id="data_nascimento"
            name="data_nascimento"
            required
          />

          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" required />

          <button type="submit">Cadastrar</button>
        </form>
      </div>

      <div id="link_logins_container">
        <a id="link_login2" href="/login2">Já tenho uma conta</a>
      </div>
